services:
  inkwell:
    build: .
    container_name: inkwell
    ports:
      - "3000:80"
    volumes:
      - inkwell-data:/root/.local/share/inkwell-server
    environment:
      - JWT_SECRET=change-me-in-production
      - OLLAMA_URL=http://host.docker.internal:11434
    restart: unless-stopped

volumes:
  inkwell-data:

<!doctype html>
<html lang="en" data-theme="dark" style="background:#0f1117;color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <title>Inkwell</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (location.search.includes('reset')) {
        // Block React from loading by removing the root
        document.getElementById('root').remove();
        document.write('<div style="color:white;background:#0f1117;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:18px">Resetting Inkwell...</div>');
        // Unregister service workers + clear caches
        if (navigator.serviceWorker) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
        // Delete IndexedDB
        var r1 = indexedDB.deleteDatabase('InkwellLocalDB');
        var done = false;
        function finish() {
          if (done) return;
          done = true;
          localStorage.clear();
          sessionStorage.clear();
          // Hard redirect
          window.location.href = location.origin + location.pathname;
        }
        r1.onsuccess = r1.onerror = finish;
        r2.onsuccess = r2.onerror = function(){};
        setTimeout(finish, 3000);
        // Prevent React from loading
        window.stop();
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
